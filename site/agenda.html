<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda / Calendrier - West Coast Arcades</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css">
<style>
.intro{text-align:center;padding:46px 16px 24px;}
.intro h1{font-family:var(--poppins);font-weight:700;font-size:38px;color:var(--navy);}
.todo{max-width:900px;margin:0 auto 20px;padding:12px 16px;background:#eef3fc;border:1px solid #cfe0fb;border-radius:6px;color:#1f4fc0;font-size:14px;text-align:center;}
.evs{max-width:880px;margin:0 auto;padding:0 16px 50px;}
.ev{display:grid;grid-template-columns:96px 1fr;gap:18px;align-items:center;border:1px solid #ebebeb;border-radius:8px;padding:16px;margin-bottom:14px;}
.ev .d{background:var(--black);color:#fff;border-radius:8px;text-align:center;padding:12px 0;}
.ev .d .n{font-family:var(--poppins);font-weight:700;font-size:22px;line-height:1;}
.ev .d .m{font-size:12px;text-transform:uppercase;color:#FDC300;margin-top:4px;}
.ev h3{font-family:var(--poppins);font-weight:700;font-size:18px;color:var(--navy);}
.ev p{font-size:14px;color:#5d6b85;}
@media(max-width:768px){.intro h1{font-size:28px;}}
</style>
</head>
<body>
<div class="sfm-overlay" id="sfmOverlay"></div>
<aside class="sfm-panel" id="sfmPanel"><button class="x" id="sfmClose">&times;</button>
<img class="lg" src="img/Logo-WCA-intro-350px.png" alt="WCA">
<nav><a href="index.html">Accueil</a><a href="nos-machines.html">Nos Machines</a><a href="nos-salons.html">Nos Salons</a><a href="nos-partenaires.html">Partenaires</a><a href="agenda.html">Agenda</a><a href="contact.html">Contacter l'Asso</a></nav></aside>
<header class="site-header"><div class="bar"><button class="burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
<a class="logo-link" href="index.html"><img src="img/Logo-WCA-intro-350px.png" alt="WCA"></a></div></header>

<section class="intro"><h1>Agenda</h1></section>
<div class="evs" id="evList"><p style="text-align:center;color:#5d6b85;padding:30px">Chargement de l'agenda…</p></div>

<section class="need"><div class="container"><h2>Vous souhaitez organiser un évènement autour de l'arcade et des flippers ?</h2><a class="btn btn-orange" href="contact.html">Contactez-nous !</a></div></section>
<div class="foot-copy">© 2026 Tous droits réservés</div>
<div class="foot-legal"><a class="btn btn-legal" href="politique-de-confidentialite.html">Politique de confidentialité</a><a class="btn btn-legal" href="rgpd.html">RGPD</a></div>
<script>(function(){var ov=document.getElementById('sfmOverlay'),pn=document.getElementById('sfmPanel');document.getElementById('burger').onclick=function(){pn.classList.add('open');ov.classList.add('open');};document.getElementById('sfmClose').onclick=ov.onclick=function(){pn.classList.remove('open');ov.classList.remove('open');};})();</script>
<script src="assets/js/wca-api.js"></script>
<script>
(async function(){
  var box=document.getElementById('evList');
  try{
    var evs=await WCA.getJSON('evenements');
    if(!evs.length){ box.innerHTML='<p style="text-align:center;color:#5d6b85;padding:30px">Aucun événement à venir pour le moment.</p>'; return; }
    box.innerHTML=evs.map(function(e){
      var d=WCA.dayMonth(e.date_debut);
      return '<div class="ev"><div class="d"><div class="n">'+d.jour+'</div><div class="m">'+d.mois+'</div></div>'+
        '<div><h3>'+WCA.esc(e.nom)+'</h3><p>📍 '+WCA.esc(e.lieu||'')+' · '+WCA.dateRange(e.date_debut,e.date_fin)+'</p></div></div>';
    }).join('');
  }catch(err){
    box.innerHTML='<p style="text-align:center;color:#a32d2d;padding:30px">Agenda momentanément indisponible. Réessayez plus tard.</p>';
  }
})();
</script>
</body>
</html>
