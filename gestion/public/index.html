<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>West Coast Arcades — Gestion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<link rel="stylesheet" href="styles.css?v=2.8.14">
</head>
<body>

<div id="login-root" class="hidden"></div>

<div class="app hidden" id="app">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="logo.png" alt="West Coast Arcades" class="brand-logo" onerror="this.replaceWith(window.logoSVG())">
      <div class="brand-txt">
        <div class="brand-name">West Coast</div>
        <div class="brand-sub">Arcades · Gestion</div>
      </div>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="userbox" id="userbox">
      <span class="avatar avatar-ph">WC</span>
      <div>
        <div class="u-name">Utilisateur</div>
        <div class="u-role">Technicien</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="burger" id="burger" aria-label="Menu"></button>
      <h1 id="page-title">Accueil</h1>
      <div class="topbar-right">
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
    </header>
    <div class="view" id="view"></div>
    <div class="partners-strip" id="partners-strip"></div>
    <footer class="appfoot" id="appfoot"></footer>
  </main>

</div>

<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<script src="app.js?v=2.8.14"></script>
</body>
</html>
